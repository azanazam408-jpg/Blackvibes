<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Vibes Cart</title>

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* GOOGLE FONT */

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0b0b0b;
  color:white;
  overflow-x:hidden;
}

/* HEADER */

header{
  width:100%;
  position:fixed;
  top:0;
  left:0;
  z-index:1000;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:22px 8%;
}

.logo{
  font-size:32px;
  font-weight:700;
}

.logo span{
  color:#c59d5f;
}

nav ul{
  display:flex;
  list-style:none;
  gap:35px;
}

nav ul li a{
  color:white;
  text-decoration:none;
  transition:0.3s;
}

nav ul li a:hover{
  color:#c59d5f;
}

.cart-icon{
  position:relative;
  font-size:24px;
  color:#c59d5f;
  cursor:pointer;
}

.cart-count{
  position:absolute;
  top:-8px;
  right:-10px;
  width:20px;
  height:20px;
  background:#c59d5f;
  color:black;
  border-radius:50%;
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* CART SECTION */

.cart-section{
  padding:140px 8% 80px;
  min-height:100vh;

  background:
  linear-gradient(rgba(0,0,0,0.82), rgba(0,0,0,0.92)),
  url('https://images.unsplash.com/photo-1483985988355-763728e1935b?q=80&w=1600&auto=format&fit=crop');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

.cart-title{
  text-align:center;
  margin-bottom:60px;
}

.cart-title h1{
  font-size:60px;
  color:#c59d5f;
}

.cart-title p{
  color:#d1d1d1;
  margin-top:12px;
}

/* CART CONTAINER */

.cart-container{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:35px;
}

/* PRODUCTS */

.cart-items{
  display:flex;
  flex-direction:column;
  gap:25px;
}

.cart-box{
  background:rgba(18,18,18,0.9);
  border-radius:20px;
  padding:25px;
  display:flex;
  align-items:center;
  gap:25px;
  transition:0.4s;
  border:1px solid rgba(255,255,255,0.05);
  animation:slideUp 0.8s ease;
}

.cart-box:hover{
  transform:translateY(-5px);
  box-shadow:0 15px 35px rgba(197,157,95,0.2);
}

.cart-box img{
  width:140px;
  height:160px;
  object-fit:cover;
  border-radius:15px;
}

.cart-info{
  flex:1;
}

.cart-info h2{
  margin-bottom:10px;
  font-size:24px;
}

.price{
  color:#c59d5f;
  font-size:22px;
  font-weight:600;
  margin-bottom:15px;
}

/* QUANTITY */

.quantity{
  display:flex;
  align-items:center;
  gap:15px;
}

.quantity button{
  width:38px;
  height:38px;
  border:none;
  background:#c59d5f;
  color:black;
  border-radius:50%;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}

.quantity button:hover{
  transform:scale(1.1);
}

.quantity span{
  font-size:18px;
}

.remove-btn{
  margin-top:18px;
  background:none;
  border:none;
  color:#ff5e5e;
  cursor:pointer;
  font-size:15px;
}

/* SUMMARY */

.summary{
  background:rgba(18,18,18,0.9);
  border-radius:20px;
  padding:30px;
  height:fit-content;
  border:1px solid rgba(255,255,255,0.05);
  animation:slideLeft 1s ease;
}

.summary h2{
  margin-bottom:30px;
  color:#c59d5f;
}

.summary-box{
  display:flex;
  justify-content:space-between;
  margin-bottom:18px;
  color:#ddd;
}

.total{
  margin-top:25px;
  padding-top:20px;
  border-top:1px solid rgba(255,255,255,0.08);
  font-size:22px;
  font-weight:600;
}

.checkout-btn{
  width:100%;
  margin-top:30px;
  padding:16px;
  border:none;
  background:#c59d5f;
  color:black;
  font-size:17px;
  font-weight:600;
  border-radius:50px;
  cursor:pointer;
  transition:0.4s;
}

.checkout-btn:hover{
  background:white;
  transform:translateY(-4px);
}

/* FOOTER */

footer{
  background:#050505;
  padding:50px 8%;
  text-align:center;
  border-top:1px solid rgba(255,255,255,0.06);
}

.socials{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:25px;
}

.socials a{
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-decoration:none;
  background:#111;
  color:#c59d5f;
  font-size:22px;
  transition:0.4s;
}

.socials a:hover{
  background:#c59d5f;
  color:black;
  transform:translateY(-5px);
}

/* ANIMATION */

@keyframes slideUp{
  from{
    opacity:0;
    transform:translateY(50px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes slideLeft{
  from{
    opacity:0;
    transform:translateX(50px);
  }
  to{
    opacity:1;
    transform:translateX(0);
  }
}

/* RESPONSIVE */

@media(max-width:950px){

  .cart-container{
    grid-template-columns:1fr;
  }

}

@media(max-width:700px){

  nav ul{
    display:none;
  }

  .cart-title h1{
    font-size:40px;
  }

  .cart-box{
    flex-direction:column;
    text-align:center;
  }

  .quantity{
    justify-content:center;
  }

}

</style>
</head>

<body>

<!-- HEADER -->

<header>

<nav>

<div class="logo">
Black <span>Vibes</span>
</div>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="collection.html">Collection</a></li>

</ul>

<div class="cart-icon">
<i class="fa-solid fa-bag-shopping"></i>
<div class="cart-count" id="cartCount">2</div>
</div>

</nav>
<a href="collection.html">
    <button class="btn">Shop Now</button>
  </a>

</header>

<!-- CART SECTION -->

<section class="cart-section">

<div class="cart-title">
<h1>Your Cart</h1>
<p>Luxury fashion selected for you</p>
</div>

<div class="cart-container">

<!-- CART ITEMS -->

<div class="cart-items">

<div class="cart-box">

<img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?q=80&w=1200&auto=format&fit=crop">

<div class="cart-info">

<h2>Luxury Black Dress</h2>

<div class="price">$120</div>

<div class="quantity">

<button class="minus">-</button>

<span class="qty">1</span>

<button class="plus">+</button>

</div>

<button class="remove-btn">Remove Item</button>

</div>

</div>

<div class="cart-box">

<img src="https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?q=80&w=1200&auto=format&fit=crop">

<div class="cart-info">

<h2>Elegant Fashion Outfit</h2>

<div class="price">$180</div>

<div class="quantity">

<button class="minus">-</button>

<span class="qty">1</span>

<button class="plus">+</button>

</div>

<button class="remove-btn">Remove Item</button>

</div>

</div>

</div>

<!-- SUMMARY -->

<div class="summary">

<h2>Order Summary</h2>

<div class="summary-box">
<span>Subtotal</span>
<span id="subtotal">$300</span>
</div>

<div class="summary-box">

<span>$20</span>
</div>

<span>Total</span>
<span id="total">$320</span>
</div>

<button class="checkout-btn">
Proceed To Checkout
</button>

</div>

</div>

</section>

<!-- FOOTER -->

<footer>

<h2>Black <span style="color:#c59d5f;">Vibes</span></h2>

<p style="margin-top:15px;color:#999;">
Premium Fashion Store For Modern Women
</p>

<div class="social-links">

      <a href="https://wa.me/923196180549" target="_blank">
        <i class="fab fa-whatsapp"></i>
      </a>

      <a href="https://www.instagram.com/black.vibes.25/" target="_blank">

</footer>

<!-- JAVASCRIPT -->

<script>

/* QUANTITY BUTTONS */

const plusBtns = document.querySelectorAll(".plus");
const minusBtns = document.querySelectorAll(".minus");
const qtys = document.querySelectorAll(".qty");

plusBtns.forEach((btn,index)=>{

btn.addEventListener("click",()=>{

let value = parseInt(qtys[index].innerText);

value++;

qtys[index].innerText = value;

updateTotal();

});

});

minusBtns.forEach((btn,index)=>{

btn.addEventListener("click",()=>{

let value = parseInt(qtys[index].innerText);

if(value > 1){

value--;

qtys[index].innerText = value;

updateTotal();

}

});

});

/* REMOVE ITEM */

const removeBtns = document.querySelectorAll(".remove-btn");

removeBtns.forEach(btn=>{

btn.addEventListener("click",()=>{

btn.closest(".cart-box").style.transform = "translateX(100%)";
btn.closest(".cart-box").style.opacity = "0";

setTimeout(()=>{

btn.closest(".cart-box").remove();

updateCartCount();

updateTotal();

},400);

});

});

/* UPDATE CART */

function updateCartCount(){

const items = document.querySelectorAll(".cart-box");

document.getElementById("cartCount").innerText = items.length;

}

/* UPDATE TOTAL */

function updateTotal(){

const prices = [120,180];

let subtotal = 0;

document.querySelectorAll(".cart-box").forEach((item,index)=>{

const qty = parseInt(item.querySelector(".qty").innerText);

subtotal += prices[index] * qty;

});

document.getElementById("subtotal").innerText = "$" + subtotal;

document.getElementById("total").innerText = "$" + (subtotal + 20);

}

</script>

</body>
</html>
